<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Sim</title>
<style>
:root {
  --bg:       #13131f;
  --surf:     #1c1c2e;
  --surf2:    #252538;
  --border:   #2e2e48;
  --text:     #dde0f0;
  --sub:      #7878a0;
  --accent:   #7c6af7;
  --acc-h:    #9a8cff;
  --green:    #4ade80;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --blue:     #60a5fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
header { display: flex; align-items: center; gap: 12px; padding: 0 20px; height: 52px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
header h1 { font-size: 1rem; font-weight: 700; letter-spacing: .04em; color: var(--acc-h); flex: 1; }
#settings-btn { background: none; border: 1px solid var(--border); color: var(--sub); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px; }
#settings-btn:hover { border-color: var(--accent); color: var(--text); }
#raidsid-status { font-size: 12px; color: var(--sub); }

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left panel */
.left { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 14px 16px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--sub); display: flex; justify-content: space-between; align-items: center; }
.chars-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.char-card { background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: border-color .15s; }
.char-card:hover { border-color: var(--accent); }
.char-info { flex: 1; min-width: 0; }
.char-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-meta { color: var(--sub); font-size: 12px; }
.icon-btn { background: none; border: none; color: var(--sub); cursor: pointer; padding: 4px; border-radius: 4px; line-height: 1; }
.icon-btn:hover { color: var(--text); background: var(--surf2); }
.icon-btn.del:hover { color: var(--red); }
.add-btn { margin: 0 8px 8px; background: var(--surf2); border: 1px dashed var(--border); color: var(--sub); border-radius: 8px; padding: 9px; width: calc(100% - 16px); cursor: pointer; font-size: 13px; transition: all .15s; }
.add-btn:hover { border-color: var(--accent); color: var(--acc-h); }

/* Right panel */
.right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Run section */
.run-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.run-section h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--sub); margin-bottom: 12px; }
#char-selector { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.selector-row { display: flex; align-items: center; gap: 10px; background: var(--surf); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; }
.selector-row label { flex: 1; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.diff-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.diff-cb { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--sub); cursor: pointer; }
.diff-cb input { accent-color: var(--accent); width: 14px; height: 14px; }
input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
.empty-note { color: var(--sub); font-size: 13px; padding: 8px 0; }
.run-controls { display: flex; align-items: center; gap: 12px; }
#go-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px 28px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .05em; transition: background .15s; }
#go-btn:hover:not(:disabled) { background: var(--acc-h); }
#go-btn:disabled { opacity: .4; cursor: not-allowed; }
#run-status-text { color: var(--sub); font-size: 13px; }

/* Results */
.results-section { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.results-section h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--sub); }
#jobs-list { display: flex; flex-direction: column; gap: 6px; }
.job-row { background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; }
.job-label { flex: 1; font-weight: 500; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .05em; }
.badge-pending  { background: #2a2a3e; color: var(--sub); }
.badge-fetching { background: #1e2a3e; color: var(--blue); }
.badge-submitting { background: #1e2a3e; color: var(--blue); }
.badge-running  { background: #1e2a3e; color: var(--blue); }
.badge-done     { background: #1a3028; color: var(--green); }
.badge-failed   { background: #3e1e1e; color: var(--red); }
.url-actions { display: flex; gap: 6px; align-items: center; }
.url-btn { background: var(--surf2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--acc-h); cursor: pointer; transition: all .15s; white-space: nowrap; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.url-btn:hover { border-color: var(--accent); background: var(--border); color: var(--text); }
.sim-preview { height: 56px; width: auto; border-radius: 6px; border: 1px solid var(--border); flex-shrink: 0; }

/* Log */
.log-wrap { margin-top: 4px; }
.log-toggle { background: none; border: none; color: var(--sub); font-size: 12px; cursor: pointer; padding: 2px 0; }
.log-toggle:hover { color: var(--text); }
#log-box { background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: 'Consolas', monospace; font-size: 12px; color: var(--sub); max-height: 160px; overflow-y: auto; margin-top: 6px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 1rem; margin-bottom: 18px; color: var(--acc-h); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--sub); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.field input, .field select, .field textarea { background: var(--surf2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 120px; font-family: 'Consolas', monospace; font-size: 12px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-primary:hover { background: var(--acc-h); }
.btn-cancel { background: none; border: 1px solid var(--border); color: var(--sub); border-radius: 7px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
.btn-cancel:hover { border-color: var(--accent); color: var(--text); }

/* Settings panel */
#settings-panel { display: none; position: fixed; top: 52px; right: 0; width: 320px; background: var(--surf); border: 1px solid var(--border); border-top: none; border-right: none; padding: 16px; z-index: 50; border-bottom-left-radius: 10px; }
#settings-panel.open { display: block; }
#settings-panel h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--sub); margin-bottom: 10px; }
#settings-panel .field { margin-bottom: 10px; }
#settings-panel input { width: 100%; }

/* Toast */
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--surf2); border: 1px solid var(--green); color: var(--green); border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 200; }
#toast.show { opacity: 1; }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Character groups — left panel */
.char-group { margin-bottom: 6px; }
.char-group-header { background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: border-color .15s; user-select: none; }
.char-group-header:hover { border-color: var(--accent); }
.char-group-header.open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: transparent; }
.char-group-body { border: 1px solid var(--border); border-top: none; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; overflow: hidden; }
.char-group-body .char-card { margin-bottom: 0; border-radius: 0; border: none; border-top: 1px solid var(--border); }
.char-group-body .char-card:first-child { border-top: none; }
.expand-arrow { color: var(--sub); font-size: 10px; transition: transform .15s; flex-shrink: 0; }
.expand-arrow.open { transform: rotate(90deg); }
.single-char { margin-bottom: 6px; }

/* Selector groups — run section */
.sel-group { display: flex; flex-direction: column; background: var(--surf); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
.sel-group-header { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; user-select: none; transition: background .1s; }
.sel-group-header:hover { background: var(--surf2); }
.sel-group-header .expand-arrow { margin-left: 2px; }
.sel-group-specs { border-top: 1px solid var(--border); }
.sel-group-specs .selector-row { border-radius: 0; border: none; border-top: 1px solid var(--border); margin-bottom: 0; padding-left: 28px; }
.sel-group-specs .selector-row:first-child { border-top: none; }
input[type=checkbox]:indeterminate { accent-color: var(--accent); opacity: 0.6; }

/* Job groups — results section */
.job-group { display: flex; flex-direction: column; background: var(--surf); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.job-group-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; transition: background .1s; }
.job-group-header:hover { background: var(--surf2); }
.job-group-body .job-row { border-radius: 0; border: none; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <h1>⚡ Auto Sim</h1>
  <span id="raidsid-status"></span>
  <button id="settings-btn" onclick="toggleSettings()">⚙ Settings</button>
</header>

<div id="settings-panel">
  <h4>Settings</h4>
  <div class="field">
    <label>raidsid cookie</label>
    <input id="raidsid-input" type="text" placeholder="Paste new raidsid here…">
  </div>
  <button class="btn-primary" onclick="saveSettings()" style="width:100%">Save</button>
</div>

<div class="main">
  <!-- Left: Characters -->
  <div class="left">
    <div class="panel-header">
      <span>Characters</span>
    </div>
    <div id="chars-list" class="chars-list"></div>
    <button class="add-btn" onclick="openModal()">+ Add Character</button>
  </div>

  <!-- Right: Run + Results -->
  <div class="right">
    <div class="run-section">
      <h2>Run</h2>
      <div id="char-selector"></div>
      <div class="run-controls">
        <button id="go-btn" onclick="startRun()" disabled>GO</button>
        <span id="run-status-text"></span>
      </div>
    </div>

    <div class="results-section">
      <h2>Results</h2>
      <div id="jobs-list"></div>
      <div class="log-wrap" id="log-wrap" style="display:none">
        <button class="log-toggle" onclick="toggleLog()">▶ Log</button>
        <div id="log-box" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<!-- Character Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <h3 id="modal-title">Add Character</h3>
    <div class="form-grid">
      <div class="field form-full">
        <label>SimC String <span style="color:var(--sub);font-weight:400;text-transform:none;letter-spacing:0">— paste here, fields fill automatically</span></label>
        <textarea id="f-simc" placeholder='mage="Xiage"&#10;level=80&#10;region=eu&#10;server=draenor&#10;spec=fire&#10;…' oninput="parseSimc()"></textarea>
      </div>
      <div class="field">
        <label>Character Name</label>
        <input id="f-name" type="text" placeholder="Xiage">
      </div>
      <div class="field">
        <label>Spec</label>
        <input id="f-spec" type="text" placeholder="Fire">
      </div>
      <div class="field">
        <label>Region</label>
        <select id="f-region">
          <option value="eu">EU</option>
          <option value="us">US</option>
          <option value="kr">KR</option>
          <option value="tw">TW</option>
        </select>
      </div>
      <div class="field">
        <label>Realm</label>
        <input id="f-realm" type="text" placeholder="draenor">
      </div>
      <div class="field">
        <label>Spec ID</label>
        <input id="f-spec-id" type="number" placeholder="63">
      </div>
      <div class="field">
        <label>Loot Spec ID</label>
        <input id="f-loot-spec-id" type="number" placeholder="same as spec id">
      </div>
      <div class="field">
        <label>Crafted Stats</label>
        <input id="f-crafted-stats" type="text" placeholder="36/49">
      </div>
    </div>
    <div style="margin-top:14px">
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sub);cursor:pointer">
        <input type="checkbox" id="f-exclude-updates">
        Exclude from gear updates when another profile with the same character is saved
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveChar()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let chars = [];
let editingId = null;
let pollTimer = null;
let logOpen = false;

// Tracks which groups are expanded (by group key = character name lowercase)
const charListOpen  = new Set();  // Characters panel
const selectorOpen  = new Set();  // Run selector
const jobGroupOpen  = new Set();  // Results panel

/** Group an array of chars by lowercased name → Map<name, char[]> */
function groupByName(arr) {
  const map = new Map();
  for (const c of arr) {
    const key = c.name.toLowerCase();
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(c);
  }
  return map;
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await loadChars();
  await refreshSettings();
  // Restore last run results
  const s = await (await fetch('/api/status')).json();
  renderJobs(s.jobs);
  renderLog(s.log);
  if (s.running) startPolling();
});

// ── Characters ────────────────────────────────────────────────────────────────
async function loadChars() {
  const r = await fetch('/api/characters');
  chars = await r.json();
  renderCharList();
  renderSelector();
}

const GEAR_SLOTS = new Set(['head','neck','shoulder','back','chest','wrist','hands','waist','legs','feet','finger1','finger2','trinket1','trinket2','main_hand','off_hand']);

function avgIlvl(simc) {
  if (!simc) return null;
  const ilvls = [];
  for (const line of simc.split(/\r?\n/)) {
    const slotMatch = line.match(/^(\w+)\s*=/);
    if (!slotMatch || !GEAR_SLOTS.has(slotMatch[1])) continue;
    const ilvlMatch = line.match(/\bilvl\s*=\s*(\d+)/);
    if (ilvlMatch) ilvls.push(parseInt(ilvlMatch[1]));
  }
  if (!ilvls.length) return null;
  return Math.round(ilvls.reduce((a, b) => a + b, 0) / ilvls.length);
}

function renderCharList() {
  const el = document.getElementById('chars-list');
  if (!chars.length) {
    el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px 8px 4px">No characters yet.</div>';
    return;
  }

  const groups = groupByName(chars);
  let html = '';

  for (const [key, group] of groups) {
    const representative = group[0];
    const isOpen = charListOpen.has(key);
    const multi = group.length > 1;

    if (!multi) {
      // Single spec — render flat card (no expand)
      const c = representative;
      const ilvl = c.ilvl || avgIlvl(c.simc_string);
      const ilvlBadge = ilvl
        ? ` <span style="color:var(--sub);font-size:11px;font-weight:400">· ${ilvl} ilvl</span>`
        : ` <span id="ilvl-${c.id}" style="color:var(--sub);font-size:11px;font-weight:400"></span>`;
      html += `
      <div class="single-char">
        <div class="char-card">
          <div class="char-info">
            <div class="char-name">${c.name} <span style="color:var(--accent);font-size:12px">${c.spec}</span>${ilvlBadge}</div>
            <div class="char-meta">${c.region.toUpperCase()} / ${c.realm}</div>
          </div>
          <button class="icon-btn" title="Edit" onclick="openModal('${c.id}')">✎</button>
          <button class="icon-btn del" title="Delete" onclick="deleteChar('${c.id}')">✕</button>
        </div>
      </div>`;
    } else {
      // Multiple specs — grouped with expand toggle
      const specsLabel = group.map(c => `<span style="color:var(--accent);font-size:11px">${c.spec}</span>`).join(' · ');
      const arrowClass = isOpen ? 'expand-arrow open' : 'expand-arrow';
      html += `
      <div class="char-group">
        <div class="char-group-header ${isOpen ? 'open' : ''}" onclick="toggleCharGroup('${key}')">
          <span class="${arrowClass}">▶</span>
          <div class="char-info" style="flex:1;min-width:0">
            <div class="char-name">${representative.name} <span style="color:var(--sub);font-size:11px;font-weight:400">${group.length} specs</span></div>
            <div style="font-size:11px;margin-top:2px">${specsLabel}</div>
          </div>
          <span style="color:var(--sub);font-size:11px">${representative.region.toUpperCase()} / ${representative.realm}</span>
        </div>
        ${isOpen ? `<div class="char-group-body">${group.map(c => {
          const ilvl = c.ilvl || avgIlvl(c.simc_string);
          const ilvlBadge = ilvl
            ? ` <span style="color:var(--sub);font-size:11px;font-weight:400">· ${ilvl} ilvl</span>`
            : ` <span id="ilvl-${c.id}" style="color:var(--sub);font-size:11px;font-weight:400"></span>`;
          return `<div class="char-card">
            <div class="char-info">
              <div class="char-name"><span style="color:var(--accent);font-size:12px">${c.spec}</span>${ilvlBadge}</div>
            </div>
            <button class="icon-btn" title="Edit" onclick="openModal('${c.id}')">✎</button>
            <button class="icon-btn del" title="Delete" onclick="deleteChar('${c.id}')">✕</button>
          </div>`;
        }).join('')}</div>` : ''}
      </div>`;
    }
  }

  el.innerHTML = html;

  // Fetch ilvl from armory for characters that don't have it cached yet
  chars.forEach(c => {
    if (c.ilvl || avgIlvl(c.simc_string)) return;
    fetch(`/api/ilvl/${c.id}`)
      .then(r => r.json())
      .then(d => {
        if (!d.ilvl) return;
        c.ilvl = d.ilvl;
        const span = document.getElementById(`ilvl-${c.id}`);
        if (span) span.textContent = `· ${d.ilvl} ilvl`;
      })
      .catch(() => {});
  });
}

function toggleCharGroup(key) {
  if (charListOpen.has(key)) charListOpen.delete(key);
  else charListOpen.add(key);
  renderCharList();
}

function renderSelector() {
  const el = document.getElementById('char-selector');
  if (!chars.length) {
    el.innerHTML = '<div class="empty-note">Add characters on the left to get started.</div>';
    updateGoBtn();
    return;
  }

  const groups = groupByName(chars);
  let html = '';

  for (const [key, group] of groups) {
    const isOpen = selectorOpen.has(key);
    const multi = group.length > 1;
    const arrowClass = isOpen ? 'expand-arrow open' : 'expand-arrow';
    const rep = group[0];

    if (!multi) {
      // Single spec — flat row (no grouping UI)
      const c = rep;
      html += `
      <div class="selector-row">
        <label>
          <input type="checkbox" class="char-cb" data-id="${c.id}" onchange="updateGoBtn()">
          <span><strong>${c.name}</strong> – ${c.spec} <span style="color:var(--sub);font-size:12px">(${c.region.toUpperCase()}/${c.realm})</span></span>
        </label>
        <div class="diff-group">
          <label class="diff-cb"><input type="checkbox" class="diff-h" data-id="${c.id}" checked onchange="updateGoBtn()"> H</label>
          <label class="diff-cb"><input type="checkbox" class="diff-m" data-id="${c.id}" checked onchange="updateGoBtn()"> M</label>
        </div>
      </div>`;
    } else {
      // Multi-spec group
      const specsPreview = group.map(c => `<span style="color:var(--accent)">${c.spec}</span>`).join(' · ');
      html += `
      <div class="sel-group">
        <div class="sel-group-header" onclick="toggleSelectorGroup('${key}')">
          <span class="${arrowClass}">▶</span>
          <input type="checkbox" class="group-cb" data-group="${key}" onclick="event.stopPropagation()" onchange="onGroupCbChange('${key}')">
          <label style="flex:1;cursor:pointer;pointer-events:none">
            <strong>${rep.name}</strong>
            <span style="color:var(--sub);font-size:12px"> (${rep.region.toUpperCase()}/${rep.realm})</span>
            <span style="font-size:11px;margin-left:6px">${specsPreview}</span>
          </label>
        </div>
        ${isOpen ? `<div class="sel-group-specs">${group.map(c => `
          <div class="selector-row">
            <label>
              <input type="checkbox" class="char-cb" data-id="${c.id}" data-group="${key}" onchange="onSpecCbChange('${key}')">
              <span style="color:var(--accent)">${c.spec}</span>
            </label>
            <div class="diff-group">
              <label class="diff-cb"><input type="checkbox" class="diff-h" data-id="${c.id}" checked onchange="updateGoBtn()"> H</label>
              <label class="diff-cb"><input type="checkbox" class="diff-m" data-id="${c.id}" checked onchange="updateGoBtn()"> M</label>
            </div>
          </div>`).join('')}
        </div>` : ''}
      </div>`;
    }
  }

  el.innerHTML = html;
  updateGoBtn();
}

function toggleSelectorGroup(key) {
  if (selectorOpen.has(key)) selectorOpen.delete(key);
  else selectorOpen.add(key);
  renderSelector();
}

/** Parent group checkbox toggled → check/uncheck all specs in that group */
function onGroupCbChange(key) {
  const groupCb = document.querySelector(`.group-cb[data-group="${key}"]`);
  const checked = groupCb.checked;
  document.querySelectorAll(`.char-cb[data-group="${key}"]`).forEach(cb => { cb.checked = checked; });
  updateGoBtn();
}

/** Individual spec checkbox changed → sync parent group checkbox state */
function onSpecCbChange(key) {
  const specCbs = [...document.querySelectorAll(`.char-cb[data-group="${key}"]`)];
  const groupCb = document.querySelector(`.group-cb[data-group="${key}"]`);
  if (!groupCb) { updateGoBtn(); return; }
  const allChecked  = specCbs.every(cb => cb.checked);
  const noneChecked = specCbs.every(cb => !cb.checked);
  groupCb.checked       = allChecked;
  groupCb.indeterminate = !allChecked && !noneChecked;
  updateGoBtn();
}

function updateGoBtn() {
  // A selection counts if the spec checkbox is checked AND at least one difficulty is checked
  // For single-spec rows (no data-group) use .char-cb; for grouped rows also .char-cb
  const anySelected = [...document.querySelectorAll('.char-cb:checked')].some(cb => {
    const id = cb.dataset.id;
    const h = document.querySelector(`.diff-h[data-id="${id}"]`)?.checked;
    const m = document.querySelector(`.diff-m[data-id="${id}"]`)?.checked;
    return h || m;
  });
  // Also count group-level selections where the group is collapsed (specs not rendered)
  const anyGroupSelected = [...document.querySelectorAll('.group-cb:checked')].length > 0;
  document.getElementById('go-btn').disabled = !(anySelected || anyGroupSelected);
}

// ── SimC parser ───────────────────────────────────────────────────────────────
const SPEC_IDS = {
  mage:         { arcane:62, fire:63, frost:64 },
  warrior:      { arms:71, fury:72, protection:73 },
  paladin:      { holy:65, protection:66, retribution:70 },
  hunter:       { 'beast_mastery':253, marksmanship:254, survival:255 },
  rogue:        { assassination:259, outlaw:260, subtlety:261 },
  priest:       { discipline:256, holy:257, shadow:258 },
  'death_knight':{ blood:250, frost:251, unholy:252 },
  shaman:       { elemental:262, enhancement:263, restoration:264 },
  warlock:      { affliction:265, demonology:266, destruction:267 },
  monk:         { brewmaster:268, windwalker:269, mistweaver:270 },
  druid:        { balance:102, feral:103, guardian:104, restoration:105 },
  'demon_hunter':{ havoc:577, vengeance:581, devourer:1480 },
  evoker:       { devastation:1467, preservation:1468, augmentation:1473 },
  'death knight':{ blood:250, frost:251, unholy:252 },
  'demon hunter':{ havoc:577, vengeance:581, devourer:1480 },
};

function parseSimc() {
  const raw = document.getElementById('f-simc').value;
  if (!raw.trim()) return;

  const lines = raw.split(/\r?\n/);
  let charName = null, charClass = null, region = null, realm = null, spec = null;

  // Find class identifier line (e.g. demon_hunter="Name") — skip copy= / profileset= lines
  for (const line of lines) {
    const m = line.match(/^(\w[\w\s]*)="([^"]+)"/);
    if (m) {
      const cls = m[1].trim().toLowerCase();
      const clsNorm = cls.replace(/ /g, '_');
      if (SPEC_IDS[cls] || SPEC_IDS[clsNorm]) {
        charClass = clsNorm;
        charName = m[2].trim();
        break;
      }
    }
  }

  for (const line of lines) {
    const kv = line.match(/^([\w]+)\s*=\s*(.+)/);
    if (!kv) continue;
    const [, key, val] = kv;
    if (key === 'region') region = val.trim().toLowerCase();
    if (key === 'server') realm  = val.trim().toLowerCase();
    if (key === 'spec')   spec   = val.trim().toLowerCase();
  }

  if (charName) document.getElementById('f-name').value = charName;
  if (region)   document.getElementById('f-region').value = region;
  if (realm)    document.getElementById('f-realm').value = realm;

  if (spec) {
    // Capitalise first letter for display
    const specDisplay = spec.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    document.getElementById('f-spec').value = specDisplay;

    // Look up spec ID
    const classSpecs = SPEC_IDS[charClass] ?? SPEC_IDS[charClass?.replace('_', ' ')];
    const specId = classSpecs?.[spec] ?? classSpecs?.[spec.replace(/ /g, '_')];
    if (specId) {
      document.getElementById('f-spec-id').value      = specId;
      document.getElementById('f-loot-spec-id').value = specId;
    }
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit Character' : 'Add Character';
  const c = id ? chars.find(x => x.id === id) : null;
  document.getElementById('f-simc').value         = c?.simc_string   ?? '';
  document.getElementById('f-name').value         = c?.name          ?? '';
  document.getElementById('f-spec').value         = c?.spec          ?? '';
  document.getElementById('f-region').value       = c?.region        ?? 'eu';
  document.getElementById('f-realm').value        = c?.realm         ?? '';
  document.getElementById('f-spec-id').value      = c?.spec_id       ?? '';
  document.getElementById('f-loot-spec-id').value = c?.loot_spec_id  ?? '';
  document.getElementById('f-crafted-stats').value = c?.crafted_stats ?? '36/49';
  document.getElementById('f-exclude-updates').checked = c?.exclude_from_item_updates ?? false;
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  editingId = null;
}

async function saveChar() {
  const specId = parseInt(document.getElementById('f-spec-id').value);
  const char = {
    name:          document.getElementById('f-name').value.trim(),
    spec:          document.getElementById('f-spec').value.trim(),
    region:        document.getElementById('f-region').value,
    realm:         document.getElementById('f-realm').value.trim(),
    spec_id:       specId || 63,
    loot_spec_id:  parseInt(document.getElementById('f-loot-spec-id').value) || specId || 63,
    crafted_stats:              document.getElementById('f-crafted-stats').value.trim() || '36/49',
    simc_string:                document.getElementById('f-simc').value.trim(),
    exclude_from_item_updates:  document.getElementById('f-exclude-updates').checked,
  };
  if (!char.name || !char.spec || !char.simc_string) {
    showToast('Name, spec and SimC string are required', true);
    return;
  }

  // Validate SimC string matches the profile name and spec
  const simcLines = char.simc_string.split(/\r?\n/);
  let simcName = null, simcSpec = null;
  for (const line of simcLines) {
    const m = line.match(/^[\w][\w\s]*="([^"]+)"/);
    if (m) { simcName = m[1].trim(); break; }
  }
  for (const line of simcLines) {
    const kv = line.match(/^spec\s*=\s*(\S+)/);
    if (kv) { simcSpec = kv[1].trim().toLowerCase(); break; }
  }
  if (simcName && simcName.toLowerCase() !== char.name.toLowerCase()) {
    showToast(`SimC mismatch: string is for "${simcName}", profile is "${char.name}"`, true);
    return;
  }
  if (simcSpec && simcSpec !== char.spec.toLowerCase()) {
    showToast(`SimC mismatch: string is ${simcSpec}, profile spec is ${char.spec}`, true);
    return;
  }

  const resp = await fetch('/api/characters', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(char) });
  const result = await resp.json();
  closeModal();
  await loadChars();
  if (result.propagated?.length) {
    showToast(`Gear synced to: ${result.propagated.join(', ')}`);
  }
}

async function deleteChar(id) {
  if (!confirm('Delete this character?')) return;
  await fetch(`/api/characters/${id}`, { method: 'DELETE' });
  await loadChars();
}

// ── Settings ──────────────────────────────────────────────────────────────────
async function refreshSettings() {
  const r = await fetch('/api/settings');
  const d = await r.json();
  document.getElementById('raidsid-status').textContent = d.has_raidsid ? `raidsid: ${d.raidsid_masked}` : 'no raidsid';
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

async function saveSettings() {
  const val = document.getElementById('raidsid-input').value.trim();
  if (!val) return;
  await fetch('/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ raidsid: val }) });
  document.getElementById('raidsid-input').value = '';
  document.getElementById('settings-panel').classList.remove('open');
  await refreshSettings();
  showToast('raidsid saved');
}

// ── Run ───────────────────────────────────────────────────────────────────────
async function startRun() {
  const selections = [];
  const seenIds = new Set();

  // Collect from visible individual spec checkboxes
  document.querySelectorAll('.char-cb:checked').forEach(cb => {
    const id = cb.dataset.id;
    if (seenIds.has(id)) return;
    seenIds.add(id);
    const diffs = [];
    if (document.querySelector(`.diff-h[data-id="${id}"]`)?.checked) diffs.push('raid-heroic');
    if (document.querySelector(`.diff-m[data-id="${id}"]`)?.checked) diffs.push('raid-mythic');
    if (diffs.length) selections.push({ char_id: id, difficulties: diffs });
  });

  // Collect from collapsed group checkboxes (specs not rendered in DOM)
  document.querySelectorAll('.group-cb:checked').forEach(groupCb => {
    const key = groupCb.dataset.group;
    // Find all chars for this group from the chars array
    const groupChars = chars.filter(c => c.name.toLowerCase() === key);
    for (const c of groupChars) {
      if (seenIds.has(c.id)) continue;
      seenIds.add(c.id);
      selections.push({ char_id: c.id, difficulties: ['raid-heroic', 'raid-mythic'] });
    }
  });

  if (!selections.length) { showToast('Select at least one character', true); return; }

  const r = await fetch('/api/run', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ selections }) });
  const d = await r.json();
  if (!r.ok) { showToast(d.error, true); return; }

  document.getElementById('go-btn').disabled = true;
  document.getElementById('run-status-text').textContent = 'Running…';
  document.getElementById('log-wrap').style.display = '';
  startPolling();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollStatus, 1500);
}

async function pollStatus() {
  const r = await fetch('/api/status');
  const d = await r.json();

  renderJobs(d.jobs);
  renderLog(d.log);

  if (!d.running) {
    clearInterval(pollTimer);
    pollTimer = null;
    document.getElementById('go-btn').disabled = false;
    document.getElementById('run-status-text').textContent = 'Done.';
  }
}

// ── Render jobs ───────────────────────────────────────────────────────────────
function renderJobs(jobs) {
  if (!jobs.length) return;
  window._lastJobs = jobs;

  // Group jobs by character name derived from char_id first segment
  const groupMap = new Map();
  for (const j of jobs) {
    const gkey = j.char_id ? j.char_id.split('-')[0] : (j.label.split('–')[0] || j.label).trim().toLowerCase();
    const displayName = j.label.split('–')[0].trim();
    if (!groupMap.has(gkey)) groupMap.set(gkey, { displayName, jobs: [] });
    groupMap.get(gkey).jobs.push(j);
  }

  // Auto-expand groups with active jobs
  for (const [key, grp] of groupMap) {
    if (grp.jobs.some(j => ['running','fetching','submitting'].includes(j.status))) {
      jobGroupOpen.add(key);
    }
  }

  const terminalStatuses = new Set(['done', 'failed', 'cancelled', 'skipped']);
  let html = '';

  for (const [key, grp] of groupMap) {
    const isOpen = jobGroupOpen.has(key);
    const { displayName, jobs: gjobs } = grp;
    const arrowClass = isOpen ? 'expand-arrow open' : 'expand-arrow';

    if (gjobs.length === 1) {
      html += jobRowHtml(gjobs[0]);
    } else {
      const doneCount   = gjobs.filter(j => j.status === 'done').length;
      const failCount   = gjobs.filter(j => j.status === 'failed').length;
      const runningAny  = gjobs.some(j => !terminalStatuses.has(j.status));
      let aggStatus = runningAny ? 'running' : (failCount > 0 ? 'failed' : 'done');
      const aggBadge = runningAny
        ? `${doneCount}/${gjobs.length} Done`
        : (failCount > 0 ? `${doneCount}/${gjobs.length} Done` : `${doneCount}/${gjobs.length} Done`);

      html += `
      <div class="job-group">
        <div class="job-group-header" onclick="toggleJobGroup('${key}')">
          <span class="${arrowClass}">▶</span>
          <span class="job-label">${displayName}</span>
          <span class="badge badge-${aggStatus}">${aggBadge}</span>
        </div>
        ${isOpen ? `<div class="job-group-body">${gjobs.map(j => jobRowHtml(j)).join('')}</div>` : ''}
      </div>`;
    }
  }

  document.getElementById('jobs-list').innerHTML = html;
}

function jobRowHtml(j) {
  return `
  <div class="job-row">
    <span class="job-label">${j.label}</span>
    <span class="badge badge-${j.status}">${statusLabel(j.status)}</span>
    ${j.sim_id && j.status === 'done' ? `<img class="sim-preview" src="https://www.raidbots.com/simbot/report/${j.sim_id}/preview.png" alt="preview" title="Sim preview" onerror="this.style.display='none'">` : ''}
    ${j.url ? `<div class="url-actions">
      <button class="url-btn" title="Copy link" onclick="copyUrl('${j.url}')">⎘ Copy</button>
      <a class="url-btn" href="${j.url}" target="_blank" rel="noopener noreferrer">↗ Open</a>
    </div>` : ''}
  </div>`;
}

function toggleJobGroup(key) {
  if (jobGroupOpen.has(key)) jobGroupOpen.delete(key);
  else jobGroupOpen.add(key);
  if (window._lastJobs) renderJobs(window._lastJobs);
}

function statusLabel(s) {
  return { pending:'Pending', fetching:'Fetching', submitting:'Submitting', running:'Running', done:'Done', failed:'Failed' }[s] ?? s;
}

function renderLog(lines) {
  const box = document.getElementById('log-box');
  box.textContent = lines.join('\n');
  box.scrollTop = box.scrollHeight;
}

function toggleLog() {
  logOpen = !logOpen;
  const box = document.getElementById('log-box');
  box.style.display = logOpen ? 'block' : 'none';
  document.querySelector('.log-toggle').textContent = (logOpen ? '▼' : '▶') + ' Log';
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => showToast('URL copied!'));
}

let toastTimer = null;
function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = err ? 'var(--red)' : 'var(--green)';
  t.style.color       = err ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
